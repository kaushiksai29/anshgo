name: Unzip Media Files

on:
  push:
    paths:
      - 'media.zip'

jobs:
  unzip-media:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Unzip media files into public/media
        run: |
          mkdir -p public/media
          unzip -o media.zip -d public/
          rm media.zip
      
      - name: Commit extracted images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/media/
          git rm media.zip --cached 2>/dev/null || true
          git commit -m "Extract media images from zip"
          git push
