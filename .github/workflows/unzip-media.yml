name: Unzip Media Files

on:
  push:
    paths:
      - '*.zip'
      - 'media*.zip'

jobs:
  unzip-media:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Unzip all media zips into public/media
        run: |
          mkdir -p public/media
          for zipfile in media*.zip; do
            if [ -f "$zipfile" ]; then
              echo "Extracting $zipfile..."
              unzip -o "$zipfile" -d public/
              rm "$zipfile"
            fi
          done
      
      - name: Commit extracted images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/media/
          git rm media*.zip --cached 2>/dev/null || true
          git commit -m "Extract media images from zip files" || echo "No changes to commit"
          git push
