name: Unzip Media Files

on:
  workflow_dispatch:

jobs:
  unzip-media:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      
      - name: List root files
        run: ls -la
      
      - name: Extract zip files
        run: |
          mkdir -p public/media
          for f in m1.zip m2.zip m3.zip; do
            if [ -f "$f" ]; then
              echo "Extracting $f..."
              unzip -o "$f" -d public/
              rm "$f"
            else
              echo "MISSING: $f"
            fi
          done
          ls -la public/media/
      
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f public/media/
          git add -u
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Extract media images"
          git push
